# Nginx Konfiguration für Titan GEO Core
# Kopiere diese Datei nach: /etc/nginx/sites-available/geo.titanwalls.de
# Dann: ln -s /etc/nginx/sites-available/geo.titanwalls.de /etc/nginx/sites-enabled/
# Dann: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name geo.titanwalls.de;

    # Redirect HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name geo.titanwalls.de;

    # SSL Zertifikate (Let's Encrypt via Certbot)
    ssl_certificate /etc/letsencrypt/live/geo.titanwalls.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geo.titanwalls.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header X-Frame-Options "ALLOWALL" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WICHTIG: X-Frame-Options NICHT auf DENY setzen!
    # Shopify embedded Apps laufen in einem iframe — ALLOWALL ist nötig.

    # Content Security Policy für Shopify Embedded App
    add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com https://*.shopify.com;" always;

    # Max Upload Size
    client_max_body_size 10M;

    # Proxy zu Node.js App
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts für lange AI-Requests
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # WebSocket Support (für HMR in Dev, optional in Prod)
        proxy_cache_bypass $http_upgrade;
    }

    # Static Assets Cache
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
