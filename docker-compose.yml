version: "3.8"

services:
  app:
    build: .
    container_name: titan-geo-core
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - app-data:/app/prisma
    networks:
      - titan-net

  caddy:
    image: caddy:2-alpine
    container_name: titan-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - titan-net
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:

networks:
  titan-net:
    driver: bridge
